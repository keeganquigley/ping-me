name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "32 7 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - swift
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Build
        run: swift build

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
